name: Test for TOML Reader Action
on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Read TOML
        id: 'properties'
        uses: Gu-ZT/toml-reader-action@main
        with:
          debug: true
          file: .github/test/test.toml
          fields: |
            package.name
            package.version
            dependencies.foo
            dependencies.bar # 不存在的字段

      - name: Show properties
        run: |
          echo "outputs: ${{ steps.properties.outputs }}"
          echo "Package Name(Spilt with _): ${{ steps.properties.outputs.package_name }}"
          echo "Package Name(Spilt with -): ${{ steps.properties.outputs.package-name }}"
          echo "Package Name(Spilt with .): ${{ steps.properties.outputs.package.name }}"
          echo "Package Version(Spilt with _): ${{ steps.properties.outputs.package_version }}"
          echo "Package Version(Spilt with -): ${{ steps.properties.outputs.package-version }}"
          echo "Package Version(Spilt with .): ${{ steps.properties.outputs.package.version }}"
          echo "Dependency Foo(Spilt with _): ${{ steps.properties.outputs.dependencies_foo }}"
          echo "Dependency Foo(Spilt with -): ${{ steps.properties.outputs.dependencies-foo }}"
          echo "Dependency Foo(Spilt with .): ${{ steps.properties.outputs.dependencies.foo }}"
          echo "Dependency Bar(Spilt with _): ${{ steps.properties.outputs.dependencies_bar }}"
          echo "Dependency Bar(Spilt with -): ${{ steps.properties.outputs.dependencies-bar }}"
          echo "Dependency Bar(Spilt with .): ${{ steps.properties.outputs.dependencies.bar }}"